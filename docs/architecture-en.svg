<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 580" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="11">
  <defs>
    <marker id="arr" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <path d="M0,0 L7,2.5 L0,5" fill="none" stroke="#444" stroke-width="1"/>
    </marker>
  </defs>

  <rect width="680" height="580" fill="#fff"/>

  <!-- Quick Desktop (outside AWS) -->
  <rect x="260" y="16" width="160" height="38" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="340" y="40" text-anchor="middle" font-size="12" font-weight="500">Quick Desktop</text>

  <!-- Client -> CloudFront -->
  <line x1="340" y1="54" x2="340" y2="92" stroke="#444" stroke-width="1" marker-end="url(#arr)"/>
  <text x="358" y="78" fill="#666" font-size="9">HTTPS</text>

  <!-- AWS Account boundary -->
  <rect x="40" y="100" width="610" height="396" rx="6" fill="#f8f9fa" stroke="#bbb" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="56" y="117" fill="#999" font-size="10" font-weight="500">AWS Account</text>

  <!-- CloudFront -->
  <rect x="260" y="110" width="160" height="36" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="340" y="133" text-anchor="middle" font-size="11" font-weight="500">CloudFront</text>

  <!-- CloudFront -> API Gateway -->
  <line x1="340" y1="146" x2="340" y2="172" stroke="#444" stroke-width="1" marker-end="url(#arr)"/>
  <text x="372" y="164" fill="#666" font-size="9">origin</text>

  <!-- API Gateway -->
  <rect x="260" y="176" width="160" height="36" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="340" y="199" text-anchor="middle" font-size="11" font-weight="500">API Gateway</text>

  <!-- API GW -> OAuth Lambda -->
  <line x1="280" y1="212" x2="180" y2="256" stroke="#444" stroke-width="1" marker-end="url(#arr)"/>
  <text x="192" y="234" fill="#666" font-size="9">/authorize /token /callback</text>

  <!-- API GW -> Middleware Lambda -->
  <line x1="400" y1="212" x2="500" y2="256" stroke="#444" stroke-width="1" marker-end="url(#arr)"/>
  <text x="472" y="234" fill="#666" font-size="9">/mcp</text>

  <!-- OAuth Lambda -->
  <rect x="80" y="260" width="160" height="36" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="160" y="283" text-anchor="middle" font-size="11">OAuth Lambda</text>

  <!-- Middleware Lambda -->
  <rect x="440" y="260" width="160" height="36" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="520" y="283" text-anchor="middle" font-size="11">Middleware Lambda</text>

  <!-- Secrets Manager (center) -->
  <rect x="260" y="336" width="160" height="36" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="340" y="359" text-anchor="middle" font-size="11">Secrets Manager</text>

  <!-- OAuth Lambda -> SM -->
  <line x1="200" y1="296" x2="280" y2="336" stroke="#444" stroke-width="1" marker-end="url(#arr)"/>
  <text x="208" y="322" fill="#666" font-size="9">Store Token</text>

  <!-- Middleware -> SM -->
  <line x1="480" y1="296" x2="400" y2="336" stroke="#444" stroke-width="1" marker-end="url(#arr)"/>
  <text x="448" y="322" fill="#666" font-size="9">Read Token</text>

  <!-- Middleware -> AgentCore -->
  <line x1="560" y1="296" x2="560" y2="348" stroke="#444" stroke-width="1" marker-end="url(#arr)"/>
  <text x="580" y="326" fill="#666" font-size="9">SigV4</text>

  <!-- AgentCore Runtime (outer box) -->
  <rect x="468" y="352" width="168" height="110" rx="4" fill="#f8f9fa" stroke="#333" stroke-width="1.2"/>
  <text x="478" y="368" fill="#666" font-size="9">AgentCore Runtime</text>

  <!-- server.js + lark-cli (inner box) -->
  <rect x="482" y="376" width="140" height="44" rx="3" fill="#fff" stroke="#555" stroke-width="1"/>
  <text x="552" y="394" text-anchor="middle" font-size="11">server.js + lark-cli</text>
  <text x="552" y="410" text-anchor="middle" font-size="9" fill="#666">28 Tier1 + discover + invoke</text>

  <!-- ARM64 label -->
  <text x="552" y="448" text-anchor="middle" font-size="9" fill="#888">ARM64 Docker</text>

  <!-- EventBridge -->
  <rect x="72" y="336" width="136" height="36" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="140" y="359" text-anchor="middle" font-size="11">EventBridge</text>

  <!-- EventBridge -> OAuth Lambda -->
  <line x1="140" y1="336" x2="140" y2="296" stroke="#444" stroke-width="1" marker-end="url(#arr)" stroke-dasharray="3,2"/>
  <text x="84" y="318" fill="#666" font-size="9">Hourly refresh</text>

  <!-- Feishu OpenAPI (outside AWS, bottom) -->
  <rect x="260" y="530" width="160" height="36" rx="4" fill="#fff" stroke="#333" stroke-width="1.2"/>
  <text x="340" y="553" text-anchor="middle" font-size="12" font-weight="500">Feishu OpenAPI</text>

  <!-- AgentCore -> Feishu (straight down to feishu center) -->
  <line x1="552" y1="462" x2="552" y2="548" stroke="#444" stroke-width="1"/>
  <line x1="552" y1="548" x2="424" y2="548" stroke="#444" stroke-width="1" marker-end="url(#arr)"/>
  <text x="558" y="504" fill="#666" font-size="9">user_access_token</text>

  <!-- OAuth Lambda -> Feishu (redirect, shorter path) -->
  <line x1="160" y1="296" x2="160" y2="548" stroke="#444" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="160" y1="548" x2="256" y2="548" stroke="#444" stroke-width="1" marker-end="url(#arr)" stroke-dasharray="3,2"/>
  <text x="170" y="440" fill="#666" font-size="9">OAuth redirect</text>
</svg>
