<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 560" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="12">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#333" stroke-width="1.5"/>
    </marker>
    <marker id="arrg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#888" stroke-width="1.3"/>
    </marker>
  </defs>
  <rect width="1080" height="560" fill="#fff"/>

  <text x="1060" y="22" text-anchor="end" fill="#aaa" font-size="10">一次 MCP 工具调用 —— 每次请求重新解析身份</text>

  <!-- ===== Actors + lifelines ===== -->
  <g>
    <rect x="35" y="38" width="150" height="44" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <text x="110" y="60" text-anchor="middle" font-size="12" font-weight="500">MCP 客户端</text>
    <text x="110" y="75" text-anchor="middle" font-size="9" fill="#999">Quick Desktop</text>
    <line x1="110" y1="82" x2="110" y2="520" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  </g>
  <g>
    <rect x="255" y="38" width="150" height="44" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <text x="330" y="60" text-anchor="middle" font-size="12" font-weight="500">MCP 端点</text>
    <text x="330" y="75" text-anchor="middle" font-size="9" fill="#999">中间件 · /mcp</text>
    <line x1="330" y1="82" x2="330" y2="520" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  </g>
  <g>
    <rect x="470" y="38" width="150" height="44" rx="6" fill="#fafafa" stroke="#888" stroke-width="1"/>
    <text x="545" y="60" text-anchor="middle" font-size="12" font-weight="500">Secrets Manager</text>
    <text x="545" y="75" text-anchor="middle" font-size="9" fill="#999">users/{userId}</text>
    <line x1="545" y1="82" x2="545" y2="520" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  </g>
  <g>
    <rect x="685" y="38" width="150" height="44" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <text x="760" y="58" text-anchor="middle" font-size="12" font-weight="500">AgentCore</text>
    <text x="760" y="73" text-anchor="middle" font-size="9" fill="#999">microVM · 会话</text>
    <line x1="760" y1="82" x2="760" y2="520" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  </g>
  <g>
    <rect x="895" y="38" width="150" height="44" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <text x="970" y="60" text-anchor="middle" font-size="12" font-weight="500">飞书 OpenAPI</text>
    <text x="970" y="75" text-anchor="middle" font-size="9" fill="#999">OAuth + REST</text>
    <line x1="970" y1="82" x2="970" y2="520" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  </g>

  <!-- ===== Messages ===== -->
  <!-- 1. client -> endpoint -->
  <line x1="110" y1="120" x2="330" y2="120" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="120" y="114" fill="#444" font-size="10">POST /mcp · Bearer MCP-Token</text>

  <!-- 2. endpoint self: verify + extract -->
  <path d="M330 144 h70 v26 h-70" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="408" y="153" fill="#444" font-size="10">校验 HMAC 签名</text>
  <text x="408" y="167" fill="#444" font-size="10">→ 取出 userId（签名保护，非用户提交）</text>

  <!-- 3. endpoint -> secrets -->
  <line x1="330" y1="196" x2="545" y2="196" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="340" y="190" fill="#444" font-size="10">读取 users/{userId}</text>

  <!-- 4. secrets -> endpoint (return) -->
  <line x1="545" y1="224" x2="330" y2="224" stroke="#888" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrg)"/>
  <text x="340" y="218" fill="#888" font-size="10">飞书 Token（绝不下发给客户端）</text>

  <!-- 5. endpoint -> agentcore -->
  <line x1="330" y1="264" x2="760" y2="264" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="340" y="258" fill="#444" font-size="10">SigV4 调用 · Mcp-Session-Id → 黏连到会话 microVM</text>

  <!-- 6. agentcore self: spawn child -->
  <path d="M760 288 h70 v26 h-70" fill="none" stroke="#333" stroke-width="1.3" marker-end="url(#arr)"/>
  <text x="838" y="297" fill="#444" font-size="10">派生子进程 —</text>
  <text x="838" y="311" fill="#444" font-size="10">飞书 Token 仅经 env 传入</text>

  <!-- 7. agentcore -> feishu -->
  <line x1="760" y1="340" x2="970" y2="340" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="770" y="334" fill="#444" font-size="10">API 调用 · user_access_token</text>

  <!-- 8. feishu -> agentcore (return) -->
  <line x1="970" y1="368" x2="760" y2="368" stroke="#888" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrg)"/>
  <text x="770" y="362" fill="#888" font-size="10">API 结果</text>

  <!-- 9. agentcore -> endpoint (return) -->
  <line x1="760" y1="408" x2="330" y2="408" stroke="#888" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrg)"/>
  <text x="340" y="402" fill="#888" font-size="10">工具结果（子进程退出 · token 不持久化）</text>

  <!-- 10. endpoint -> client (return) -->
  <line x1="330" y1="436" x2="110" y2="436" stroke="#888" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrg)"/>
  <text x="120" y="430" fill="#888" font-size="10">MCP 响应</text>

  <!-- footnote band -->
  <line x1="35" y1="470" x2="1045" y2="470" stroke="#eee" stroke-width="1"/>
  <text x="35" y="492" fill="#666" font-size="10">换一个用户 → 换一个 MCP-Token → 换一个 userId → 该用户自己的 secret。系统中不存在任何隐式的"当前用户"。</text>
  <text x="35" y="508" fill="#999" font-size="9">隔离要点：签名的 userId（步骤 2）· 每用户独立 secret（步骤 3）· 每会话 microVM + 每次调用子进程 + token 仅经 env（步骤 5–6）。</text>
</svg>
