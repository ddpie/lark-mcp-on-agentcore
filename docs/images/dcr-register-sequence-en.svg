<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 660" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="12">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#333" stroke-width="1.5"/>
    </marker>
    <marker id="arrg" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#888" stroke-width="1.3"/>
    </marker>
  </defs>
  <rect width="1080" height="660" fill="#fff"/>

  <text x="1060" y="22" text-anchor="end" fill="#aaa" font-size="10">Dynamic Client Registration (RFC 7591 / 9728) — request path for a self-registering client</text>

  <!-- ===== Participants + lifelines ===== -->
  <g>
    <rect x="30" y="40" width="160" height="46" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <text x="110" y="60" text-anchor="middle" font-size="12" font-weight="500">Client</text>
    <text x="110" y="76" text-anchor="middle" font-size="9" fill="#999">Kiro · Claude Code · Codex</text>
    <line x1="110" y1="86" x2="110" y2="566" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  </g>
  <g>
    <rect x="290" y="40" width="160" height="46" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <text x="370" y="60" text-anchor="middle" font-size="12" font-weight="500">Edge</text>
    <text x="370" y="76" text-anchor="middle" font-size="9" fill="#999">CloudFront → API Gateway</text>
    <line x1="370" y1="86" x2="370" y2="566" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  </g>
  <g>
    <rect x="560" y="40" width="180" height="46" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <text x="650" y="60" text-anchor="middle" font-size="12" font-weight="500">Middleware Lambda</text>
    <text x="650" y="76" text-anchor="middle" font-size="9" fill="#999">/mcp · data plane</text>
    <line x1="650" y1="86" x2="650" y2="566" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  </g>
  <g>
    <rect x="880" y="40" width="180" height="46" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
    <text x="970" y="60" text-anchor="middle" font-size="12" font-weight="500">OAuth Lambda</text>
    <text x="970" y="76" text-anchor="middle" font-size="9" fill="#999">.well-known/* · /register</text>
    <line x1="970" y1="86" x2="970" y2="566" stroke="#bbb" stroke-width="1" stroke-dasharray="4,3"/>
  </g>

  <!-- ===== Round 1: unauthenticated /mcp → 401 ===== -->
  <line x1="110" y1="116" x2="370" y2="116" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="120" y="110" fill="#444" font-size="11">① POST /mcp · no token</text>
  <line x1="370" y1="142" x2="650" y2="142" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="650" y1="170" x2="370" y2="170" stroke="#888" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrg)"/>
  <text x="380" y="164" fill="#888" font-size="10">401 · WWW-Authenticate → discovery URL</text>
  <line x1="370" y1="196" x2="110" y2="196" stroke="#888" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrg)"/>

  <!-- ===== Round 2: discovery ===== -->
  <line x1="110" y1="230" x2="370" y2="230" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="120" y="224" fill="#444" font-size="11">② GET /.well-known/* · discovery</text>
  <line x1="370" y1="256" x2="970" y2="256" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="970" y1="284" x2="370" y2="284" stroke="#888" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrg)"/>
  <text x="380" y="278" fill="#888" font-size="10">authorization-server + protected-resource metadata</text>
  <line x1="370" y1="310" x2="110" y2="310" stroke="#888" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrg)"/>

  <!-- ===== Round 3: register ===== -->
  <line x1="110" y1="344" x2="370" y2="344" stroke="#333" stroke-width="2" marker-end="url(#arr)"/>
  <text x="120" y="338" fill="#444" font-size="11" font-weight="600">③ POST /register · redirect_uris (requests no secret)</text>
  <line x1="370" y1="370" x2="970" y2="370" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="735" y="386" width="325" height="48" rx="6" fill="#fafafa" stroke="#888" stroke-width="1.2"/>
  <text x="747" y="405" fill="#444" font-size="10" font-weight="600">validate redirect_uris against allowlist;</text>
  <text x="747" y="422" fill="#444" font-size="10">mint HMAC-signed client_id (no secret stored)</text>
  <line x1="970" y1="456" x2="370" y2="456" stroke="#888" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrg)"/>
  <text x="380" y="450" fill="#888" font-size="10">201 · client_id (token_endpoint_auth_method: none)</text>
  <line x1="370" y1="482" x2="110" y2="482" stroke="#888" stroke-width="1.3" stroke-dasharray="5,3" marker-end="url(#arrg)"/>

  <!-- ===== Continue ===== -->
  <line x1="110" y1="516" x2="370" y2="516" stroke="#333" stroke-width="1.3" stroke-dasharray="2,2" marker-end="url(#arr)"/>
  <text x="120" y="510" fill="#444" font-size="11" font-weight="600">④ Continue with OAuth 2.0 + PKCE (see oauth-pkce-sequence)</text>

  <!-- footnote -->
  <line x1="30" y1="582" x2="1050" y2="582" stroke="#eee" stroke-width="1"/>
  <text x="30" y="602" fill="#666" font-size="10">Every request and response traverses the Edge (CloudFront + API Gateway), which terminates TLS, applies WAF and per-IP rate limits — strictest on the unauthenticated /register — and routes each path to its Lambda.</text>
  <text x="30" y="620" fill="#666" font-size="10">The 401 is issued by the data plane (Middleware Lambda); discovery and registration are served by the control plane (OAuth Lambda).</text>
  <text x="30" y="638" fill="#999" font-size="9">Public clients receive no secret — PKCE is their sole authentication at /token. Amazon Quick bypasses DCR and uses a pre-shared client_id + client_secret.</text>
</svg>
