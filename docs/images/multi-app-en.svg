<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" font-family="-apple-system, BlinkMacSystemFont, 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif" font-size="12">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#333" stroke-width="1.5"/>
    </marker>
  </defs>
  <rect width="1000" height="420" fill="#fff"/>

  <text x="980" y="24" text-anchor="end" fill="#aaa" font-size="10">one AWS account + region · N Feishu apps</text>
  <text x="20" y="24" fill="#aaa" font-size="11">Multi-app isolation</text>

  <!-- shared image -->
  <rect x="390" y="46" width="220" height="36" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="500" y="64" text-anchor="middle" font-size="12" font-weight="500">ECR image</text>
  <text x="500" y="77" text-anchor="middle" font-size="9" fill="#999">built once · repoint-N</text>
  <line x1="440" y1="82" x2="270" y2="118" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="560" y1="82" x2="730" y2="118" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- default app -->
  <rect x="60" y="120" width="360" height="150" rx="8" fill="#fafafa" stroke="#333" stroke-width="1.5"/>
  <text x="80" y="146" font-size="14" font-weight="600">default app</text>
  <text x="400" y="146" text-anchor="end" font-size="9" fill="#999">slug = ""</text>
  <text x="80" y="174" font-size="11" fill="#444">own endpoint · Lambdas · Runtime</text>
  <text x="80" y="198" font-size="11" fill="#444">own secrets · signing key</text>
  <text x="80" y="222" font-size="11" fill="#444">🔒 own CMK (per-app)</text>
  <text x="80" y="252" font-size="9" fill="#999">lark_mcp_on_agentcore · users/{id}</text>

  <!-- team-a app -->
  <rect x="580" y="120" width="360" height="150" rx="8" fill="#fafafa" stroke="#333" stroke-width="1.5"/>
  <text x="600" y="146" font-size="14" font-weight="600">team-a app</text>
  <text x="920" y="146" text-anchor="end" font-size="9" fill="#999">slug = "team-a"</text>
  <text x="600" y="174" font-size="11" fill="#444">own endpoint · Lambdas · Runtime</text>
  <text x="600" y="198" font-size="11" fill="#444">own secrets · signing key</text>
  <text x="600" y="222" font-size="11" fill="#444">🔒 own CMK (per-app)</text>
  <text x="600" y="252" font-size="9" fill="#999">…_team_a · users/team-a/{id}</text>

  <!-- isolation barrier -->
  <line x1="500" y1="128" x2="500" y2="262" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="500" y="292" text-anchor="middle" font-size="11" fill="#c0392b" font-weight="500">✗ neither app can read, delete, forge, or decrypt the other's tokens</text>

  <!-- shared layer -->
  <line x1="240" y1="270" x2="240" y2="322" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="760" y1="270" x2="760" y2="322" stroke="#333" stroke-width="1.5" marker-end="url(#arr)"/>
  <rect x="60" y="324" width="540" height="64" rx="8" fill="#f8f9fa" stroke="#333" stroke-width="1.2"/>
  <text x="330" y="350" text-anchor="middle" font-size="12" font-weight="600">Shared: WAF (optional) · ECR · AWS account</text>
  <text x="330" y="372" text-anchor="middle" font-size="10" fill="#999">deployed once, reused by every app</text>

  <rect x="620" y="324" width="320" height="64" rx="8" fill="#fff" stroke="#888" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="780" y="350" text-anchor="middle" font-size="12" font-weight="600">Fleet roll-up dashboard</text>
  <text x="780" y="372" text-anchor="middle" font-size="10" fill="#999">optional · read-only · auto-discovers all apps</text>
</svg>
