pre-commit:
  parallel: true
  jobs:
    - name: eslint
      glob: "*.{ts,js}"
      run: npx eslint {staged_files} --max-warnings 5

    - name: hadolint
      glob: "**/Dockerfile*"
      run: docker run --rm -i hadolint/hadolint < docker/Dockerfile

    - name: gitleaks
      run: gitleaks detect --source . --no-git
      skip:
        - ref: merge
        - run: "! command -v gitleaks"

    - name: check-invariants
      run: ./scripts/check-invariants.sh

pre-push:
  jobs:
    - name: test
      run: ./scripts/test.sh
    # Advisory only: always exits 0, never blocks the push (unlike `test` above).
    - name: docs-llm-check
      run: ./scripts/check-docs-llm.sh
