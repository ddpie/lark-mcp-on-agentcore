version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies

  - package-ecosystem: npm
    directory: /docker
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies

  - package-ecosystem: npm
    directory: /infra
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    labels:
      - dependencies

  - package-ecosystem: docker
    directory: /docker
    schedule:
      interval: monthly
    labels:
      - dependencies
